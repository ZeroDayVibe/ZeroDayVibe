<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayVibe | Professional Cybersecurity Consultant</title>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #050d1a; color: #fff; margin: 0; line-height: 1.6; }
        
        /* Top Bar */
        .top-bar { background: #00ff41; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; color: #000; font-weight: bold; font-size: 13px; }
        .social-icons a { margin-left: 15px; display: inline-block; }
        .social-icons img { width: 20px; height: 20px; vertical-align: middle; }

        /* Navbar */
        nav { background: #0a192f; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ff41; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { height: 80px; width: auto; }
        .wa-btn { background: transparent; color: #fff; border: 2px solid #fff; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .wa-btn:hover { background: #00ff41; color: #000; border-color: #00ff41; }
        
        /* Menu Styling - Gap Added */
        .menu-wrapper { display: flex; align-items: center; gap: 30px; }
        .menu { display: flex; gap: 25px; } /* মেনু অপশনগুলোর মাঝে ফাঁক */
        .menu a { color: #fff; text-decoration: none; font-weight: 600; font-size: 15px; transition: 0.3s; }
        .menu a:hover { color: #00ff41; }

        .hero { padding: 100px 20px; text-align: center; }
        .section { padding: 80px 20px; max-width: 1100px; margin: auto; }
        h1, h2 { color: #00ff41; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: #0a192f; padding: 30px; border-radius: 10px; border-left: 4px solid #00ff41; }
        button { background: #00ff41; color: #000; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div>📞 +880 1856 951660 | ✉️ zerodayvibe@gmail.com</div>
    <div class="social-icons">
        <a href="https://wa.me/8801856951660" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
        <a href="https://x.com/ZeroDayVibe" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png"></a>
        <a href="https://www.linkedin.com/in/zerodayvibe" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png"></a>
    </div>
</div>

<nav>
    <div class="nav-left">
        <img src="logo.png" alt="Logo" class="logo">
        <a href="#contact" class="wa-btn">Send Message <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" style="width:16px;"></a>
    </div>
    <div class="menu-wrapper">
        <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchContent()" style="padding: 8px; border-radius: 4px; border: 1px solid #00ff41; background: #050d1a; color: #fff;">
        <div class="menu">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#blog">Blog</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
</nav>

<div id="home" class="hero"><h1>Secure Your Digital Future</h1></div>
<div id="about" class="section"><h2>About ZeroDayVibe</h2></div>
<div id="services" class="section"><h2>Professional Services</h2></div>
<div id="blog" class="section"><h2>Insights & Blog</h2></div>
<div id="portfolio" class="section"><h2>Portfolio</h2></div>
<div id="contact" class="section"><h2>Get In Touch</h2></div>

<script>
function searchContent() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.section, .hero').forEach(s => s.style.display = s.innerText.toLowerCase().includes(input) ? "block" : "none");
}
</script>

</body>
</html>
