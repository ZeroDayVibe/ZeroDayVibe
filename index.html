<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ZeroDayVibe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #050d1a; color: #fff; line-height: 1.6; }
        
        .contact-container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        h1 { color: #00ff41; margin-bottom: 20px; }
        
        /* Info Grid */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .info-box { background: #0a192f; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #1a3a5f; }
        .info-box h3 { color: #00ff41; margin-bottom: 10px; }
        
        /* Form Section */
        .form-section { background: #0a192f; padding: 40px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #050d1a; border: 1px solid #1a3a5f; color: #fff; border-radius: 5px; }
        button { background: #00ff41; color: #000; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .header-section { margin-bottom: 40px; }
    </style>
</head>
<body>

<div class="contact-container">
    <div class="header-section">
        <h1>Get In Touch with ZeroDayVibe</h1>
        <p>Talk to our security experts about identifying and reducing real-world security risks in your organization.</p>
    </div>

    <div class="info-grid">
        <div class="info-box">
            <h3>Send Your Mail</h3>
            <p>zerodayvibe@gmail.com</p>
        </div>
        <div class="info-box">
            <h3>Any Question?</h3>
            <p>+880 1856 951660</p>
        </div>
        <div class="info-box">
            <h3>Our Address</h3>
            <p>Khulna-9100, Bangladesh</p>
        </div>
    </div>

    <div class="form-section">
        <h2>Send Message</h2>
        <form action="https://formspree.io/f/mgoqnlkz" method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="mobile" placeholder="Mobile no">
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" rows="5" placeholder="Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
</div>

</body>
</html>
