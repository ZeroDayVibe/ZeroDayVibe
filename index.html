<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroDayVibe | Cybersecurity Expert</title>
    <style>
        /* Base Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #050d1a; color: #ffffff; line-height: 1.6; }
        html { scroll-behavior: smooth; }

        /* Navigation Bar */
        nav { background: #0a192f; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ff41; position: sticky; top: 0; z-index: 1000; }
        .logo { height: 60px; }
        .menu { display: flex; gap: 25px; }
        .menu a { color: #fff; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .menu a:hover { color: #00ff41; }
        .search-box { background: #050d1a; border: 1px solid #00ff41; color: #fff; padding: 5px 10px; border-radius: 5px; }

        /* Sections */
        .section { padding: 80px 50px; }
        h1, h2 { color: #00ff41; margin-bottom: 20px; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: #0a192f; padding: 30px; border-left: 4px solid #00ff41; border-radius: 8px; }

        /* Footer Info */
        .footer-section { background: #0a192f; padding: 40px; text-align: center; border-top: 1px solid #1a3a5f; }
        .contact-grid { display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="ZeroDayVibe" class="logo">
        <div class="menu">
            <input type="text" id="searchInput" class="search-box" placeholder="Search..." onkeyup="filter()">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#portfolio">Portfolio</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="home" class="section"><h1>Welcome to ZeroDayVibe</h1></section>
    <section id="about" class="section"><h2>About Us</h2></section>
    <section id="services" class="section"><h2>Services</h2><div class="card-container"><div class="card"><h3>Penetration Testing</h3></div></div></section>
    <section id="portfolio" class="section"><h2>Portfolio</h2><div class="card-container"><div class="card"><h3>Project Alpha</h3></div></div></section>
    <section id="contact" class="section"><h2>Contact</h2></section>

    <div class="footer-section">
        <div class="contact-grid">
            <div>📍 Khulna-9100, Bangladesh</div>
            <div>📞 +880 1856 951660</div>
            <div>✉️ zerodayvibe@gmail.com</div>
        </div>
        <p style="margin-top:20px;">© 2026 ZeroDayVibe</p>
    </div>

    <script>
        function filter() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.section').forEach(s => s.style.display = s.innerText.toLowerCase().includes(q) ? "block" : "none");
        }
    </script>
</body>
</html>
